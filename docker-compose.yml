services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8000"
    env_file:
      - api/.env
    environment:
      - LOG_LEVEL=INFO

  # Development mode: run frontend and backend separately with hot reload
  api-dev:
    build:
      context: ./api
      dockerfile: ../Dockerfile
      target: runtime
    command: uv run --directory /app/api uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
    env_file:
      - api/.env
    profiles:
      - dev

  ui-dev:
    image: node:22-alpine
    working_dir: /app/ui
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./ui:/app/ui
      - /app/ui/node_modules
    profiles:
      - dev
